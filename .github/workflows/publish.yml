name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        node-version: [18, 20, 22]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Lint
        run: node --check index.js
      - name: Test
        run: npm test
      - name: Smoke test — all 7 tools register
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"tools/list"}' | timeout 5 node index.js | python3 -c "
          import sys, json
          data = json.loads(sys.stdin.read())
          names = [t['name'] for t in data['result']['tools']]
          expected = ['audio_plugin_build','audio_plugin_configure','audio_plugin_create','audio_plugin_lint','audio_plugin_plugins','audio_plugin_test','audio_plugin_validate']
          missing = [n for n in expected if n not in names]
          if missing:
            print(f'FAIL: missing tools: {missing}')
            sys.exit(1)
          print(f'OK: {len(names)} tools registered')
          "

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm publish --provenance --access public
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
